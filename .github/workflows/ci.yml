name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tier4_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tier4_ci
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-only-secret-not-for-real-use
      DEFAULT_ADMIN_PASSWORD: CI-Only-Admin-1!
      APP_ENV: staging

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e .[dev]

      - name: Lint
        run: ruff check backend tests

      - name: Run real migrations against Postgres (would have caught F0)
        run: alembic upgrade head

      - name: Test
        run: python -m pytest -q

      - name: Security scan
        run: bash scripts/security_scan.sh
